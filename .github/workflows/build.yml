name: Build
on:
  push:
    tags: [ 'v*' ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter yt-dlp gdown pyinstaller
      - shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive ffmpeg.zip . -Force
          $d = Get-ChildItem -Directory "ffmpeg-*" | Select-Object -First 1
          Copy-Item "$($d.FullName)/bin/ffmpeg.exe" ffmpeg.exe
      - run: pyinstaller --onedir --windowed --name "LiveStreamPro" --icon "icon.ico" --add-data "ffmpeg.exe;." --collect-all "customtkinter" --hidden-import "PIL._tkinter_finder" main.py
      - uses: actions/upload-artifact@v4
        with:
          name: LiveStreamPro
          path: dist/LiveStreamPro/
